[pytest]
# Pytest configuration for PolicyPilot backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --maxfail=1
    -ra

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    api: API endpoint tests
    slow: Tests that take longer to run
    scanner: Secret scanner tests
    validator: README validator tests
    prompt: Prompt checker tests
    scoring: Scoring engine tests
    file: File handler tests
    report: Report generator tests

# Coverage options
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

; Made with Bob
