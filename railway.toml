[build]
builder = "NIXPACKS"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[nixpacks]
nixpkgsArchive = "e05605ec414618eab4a7a6aea8b38f6fbbcc8f08"

[nixpacks.phases.setup]
nixPkgs = ["python311"]

[nixpacks.phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[nixpacks.phases.build]
cmds = ["cd backend && python -c 'from app.config import ensure_directories; ensure_directories()'"]
