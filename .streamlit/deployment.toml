# Streamlit Production Deployment Configuration
# Use this for production deployments on Railway

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
# Allow external connections from Railway routing
enableCORS = true
enableXsrfProtection = true
enableWebsocketCompression = true
maxMessageSize = 200

[logger]
level = "info"

[theme]
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"

[browser]
gatherUsageStats = false
