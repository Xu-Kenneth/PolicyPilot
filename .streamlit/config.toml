# Streamlit Configuration

[theme]
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
enableCORS = false
enableXsrfProtection = true
# Port configuration for local development (Railway uses $PORT env var)
port = 8501

[client]
showErrorDetails = true

[logger]
level = "debug"
